apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ui
  namespace: inference-app
  labels:
    app: chat-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-ui
  template:
    metadata:
      labels:
        app: chat-ui
    spec:
      containers:
        - name: chat-ui
          image: chat-ui:latest
          ports:
            - containerPort: 3000
          env:
            - name: GATEWAY_URL
              value: "http://envoy-ai-gateway.envoy-ai-gateway.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
