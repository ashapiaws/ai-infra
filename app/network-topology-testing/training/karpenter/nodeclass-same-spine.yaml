# ─────────────────────────────────────────────────────────────────────────────
# EC2NodeClass — Same-Spine (with Cluster Placement Group)
#
# Uses an EC2 Cluster Placement Group to pack g6e.8xlarge instances onto
# the same physical spine/rack, ensuring single-hop network communication.
# g6e.8xlarge: 1x NVIDIA L40S GPU, 32 vCPUs, 256GB RAM, 1x EFA interface.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: training-same-spine
spec:
  amiSelectorTerms:
    - alias: al2023@latest

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
        topology.kubernetes.io/zone: us-west-2a  # Must match NodePool AZ

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"

  # ─── Placement Group: Cluster strategy ───
  # Forces all instances onto the same underlying network spine
  instanceProfile: "${INSTANCE_PROFILE}"

  placement:
    placementGroup: training-same-spine-pg  # Must be pre-created (see below)

  # EFA network interfaces — g6e.8xlarge supports 1 EFA interface
  networkInterfaces:
    - associatePublicIPAddress: false
      deviceIndex: 0
      groups: []  # Populated from securityGroupSelectorTerms
    - associatePublicIPAddress: false
      interfaceType: efa
      deviceIndex: 1
      groups: []

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        deleteOnTermination: true

  tags:
    topology-test: same-spine
    placement-group: clustered
