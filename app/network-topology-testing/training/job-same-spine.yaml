# ─────────────────────────────────────────────────────────────────────────────
# Training Job — SAME-SPINE (Placement Group)
#
# Targets nodes provisioned by the training-same-spine Karpenter NodePool.
# All nodes are in a cluster placement group (single network spine).
# Expected: lowest latency all-reduce, highest throughput baseline.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: topology-training
---
apiVersion: v1
kind: Service
metadata:
  name: training-headless
  namespace: topology-training
spec:
  clusterIP: None
  selector:
    app: topology-training
    topology-mode: same-spine
  ports:
    - name: nccl
      port: 29500
      targetPort: 29500
---
apiVersion: batch/v1
kind: Job
metadata:
  name: training-same-spine
  namespace: topology-training
  labels:
    app: topology-training
    topology-mode: same-spine
    test: network-topology
spec:
  parallelism: 3
  completions: 3
  completionMode: Indexed
  template:
    metadata:
      labels:
        app: topology-training
        topology-mode: same-spine
        test: network-topology
    spec:
      subdomain: training-headless
      restartPolicy: Never

      # ─── Target same-spine Karpenter nodes (placement group) ───
      nodeSelector:
        topology-test/node-group: same-spine
        node.kubernetes.io/instance-type: g6e.8xlarge

      # Pods should all land on the same spine (guaranteed by placement group)
      # This affinity is technically redundant with the placement group but
      # adds a scheduling safety net.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: topology-training
                  topology-mode: same-spine
              topologyKey: "topology.kubernetes.io/zone"

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: training
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/topology-training:latest
          args:
            - "--nnodes=3"
            - "--nproc_per_node=1"
            - "--rdzv_id=same-spine-test"
            - "--rdzv_backend=c10d"
            - "--rdzv_endpoint=training-same-spine-0.training-headless.topology-training.svc.cluster.local:29500"
            - "train.py"
            - "--topology-mode=same-spine"
            - "--run-id=same-spine-$(date +%Y%m%d-%H%M%S)"

          env:
            # ── NCCL Configuration (EFA-enabled on g6e.8xlarge) ──
            - name: NCCL_ALGO
              value: "Ring"
            - name: NCCL_PROTO
              value: "Simple"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"

            # ── EFA Configuration ──
            - name: FI_PROVIDER
              value: "efa"
            - name: FI_EFA_USE_DEVICE_RDMA
              value: "1"
            - name: FI_EFA_FORK_SAFE
              value: "1"
            - name: RDMAV_FORK_SAFE
              value: "1"

            # ── Distributed Config ──
            - name: MASTER_ADDR
              value: "training-same-spine-0.training-headless.topology-training.svc.cluster.local"
            - name: MASTER_PORT
              value: "29500"

            # ── Topology Metadata ──
            - name: TOPOLOGY_MODE
              value: "same-spine"
            - name: NODE_GROUP
              value: "training-same-spine"

            # ── Pod Identity ──
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              nvidia.com/gpu: 1
              vpc.amazonaws.com/efa: 1
              memory: "128Gi"
              cpu: "16"
            limits:
              nvidia.com/gpu: 1
              vpc.amazonaws.com/efa: 1
              memory: "200Gi"
              cpu: "32"

          ports:
            - containerPort: 29500
              name: rdzv
            - containerPort: 8000
              name: metrics

          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: results
              mountPath: /workspace/results

      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "32Gi"
        - name: results
          emptyDir: {}
