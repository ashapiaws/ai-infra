---
# LiteLLM AI Gateway Deployment
# Provides OpenAI-compatible routing to vLLM backends
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: inference
data:
  config.yaml: |
    model_list:
      - model_name: "llama-3.1-8b"
        litellm_params:
          model: "openai/llama-3.1-8b"
          api_base: "http://vllm-inference.inference.svc.cluster.local:8000/v1"
          api_key: "not-needed"
          max_retries: 2
          timeout: 120

      - model_name: "llama-3.1-70b"
        litellm_params:
          model: "openai/llama-3.1-70b"
          api_base: "http://vllm-70b-inference.inference.svc.cluster.local:8000/v1"
          api_key: "not-needed"
          max_retries: 2
          timeout: 300

    router_settings:
      routing_strategy: "least-busy"
      num_retries: 2
      timeout: 120

    general_settings:
      master_key: "sk-CHANGE-ME-IN-PRODUCTION"

    litellm_settings:
      success_callback: ["prometheus"]
      drop_params: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-gateway
  namespace: inference
  labels:
    app: litellm-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litellm-gateway
  template:
    metadata:
      labels:
        app: litellm-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          ports:
            - containerPort: 4000
              name: http
              protocol: TCP
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-gateway
  namespace: inference
  labels:
    app: litellm-gateway
spec:
  selector:
    app: litellm-gateway
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      name: http
  type: ClusterIP
