---
# Open WebUI — Chat Interface
# Connects to LiteLLM gateway via OpenAI-compatible API
# Provides: multi-user chat, conversation history, RAG, model switching
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: inference
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: inference
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # Point to LiteLLM gateway as the OpenAI-compatible backend
            - name: OPENAI_API_BASE_URL
              value: "http://litellm-gateway.inference.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              value: "sk-CHANGE-ME-IN-PRODUCTION"
            # Disable Ollama since we're using OpenAI-compatible API only
            - name: OLLAMA_BASE_URL
              value: ""
            - name: ENABLE_OLLAMA_API
              value: "false"
            # WebUI settings
            - name: WEBUI_NAME
              value: "AI Scale Lab"
            - name: WEBUI_AUTH
              value: "true"
            - name: DEFAULT_MODELS
              value: "llama-3.1-8b"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: inference
  labels:
    app: open-webui
spec:
  selector:
    app: open-webui
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
# Optional: Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: inference
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: "REPLACE_WITH_ACM_CERT_ARN"
spec:
  ingressClassName: alb
  rules:
    - host: ai-lab.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
