apiVersion: batch/v1
kind: Job
metadata:
  name: tas-sample-job
  labels:
    kueue.x-k8s.io/queue-name: tas-user-queue
spec:
  parallelism: 60
  completions: 60
  completionMode: Indexed
  template:
    metadata:
      annotations:
        kueue.x-k8s.io/podset-preferred-topology: "topology.k8s.aws/network-node-layer-3"
    spec:
      containers:
      - name: dummy-job
        image: registry.k8s.io/e2e-test-images/agnhost:2.53
        args: ["pause"]
        resources:
          requests:
            cpu: "1"
      restartPolicy: Never