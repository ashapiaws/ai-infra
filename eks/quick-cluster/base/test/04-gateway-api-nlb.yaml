---
# GatewayClass - uses AWS Load Balancer Controller
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: aws-nlb
spec:
  controllerName: gateway.k8s.aws/alb
---
# Gateway - provisions an NLB via Gateway API spec
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-gateway
  namespace: infra-test
  annotations:
    # NLB configuration via Gateway API
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  gatewayClassName: aws-nlb
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
# Simple backend for the Gateway route
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-backend
  namespace: infra-test
  labels:
    app: gateway-backend
    test: gateway-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-backend
  template:
    metadata:
      labels:
        app: gateway-backend
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=gateway-api-ok"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-backend
  namespace: infra-test
spec:
  selector:
    app: gateway-backend
  ports:
    - port: 8080
      targetPort: 8080
---
# HTTPRoute - routes traffic from Gateway to backend
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-route
  namespace: infra-test
spec:
  parentRefs:
    - name: test-gateway
      namespace: infra-test
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gateway-backend
          port: 8080
