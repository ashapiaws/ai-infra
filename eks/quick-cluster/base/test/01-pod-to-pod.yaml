---
# Server pod - listens on port 8080
apiVersion: v1
kind: Pod
metadata:
  name: echo-server
  namespace: infra-test
  labels:
    app: echo-server
    test: pod-to-pod
spec:
  containers:
    - name: echo
      image: hashicorp/http-echo:0.2.3
      args:
        - "-text=pod-to-pod-ok"
        - "-listen=:8080"
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
---
# Service for the echo server
apiVersion: v1
kind: Service
metadata:
  name: echo-server
  namespace: infra-test
spec:
  selector:
    app: echo-server
  ports:
    - port: 8080
      targetPort: 8080
---
# Client pod - curls the server pod via service DNS
apiVersion: v1
kind: Pod
metadata:
  name: pod-to-pod-test
  namespace: infra-test
  labels:
    test: pod-to-pod
  annotations:
    description: "Validates pod-to-pod communication via ClusterIP service"
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.11.0
      command:
        - sh
        - -c
        - |
          echo "Waiting for echo-server to be ready..."
          sleep 10
          echo "Testing pod-to-pod connectivity..."
          RESULT=$(curl -sf http://echo-server.infra-test.svc.cluster.local:8080)
          if [ "$RESULT" = "pod-to-pod-ok" ]; then
            echo "PASS: Pod-to-pod communication successful"
            exit 0
          else
            echo "FAIL: Got unexpected response: $RESULT"
            exit 1
          fi
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
