# HTTPRoute - routes traffic from the ALB Gateway to the Istio Ingress Gateway service
# The ALB forwards plaintext HTTP traffic to the Istio Ingress Gateway on port 8080
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: istio-ingress-route
  namespace: istio-system
spec:
  parentRefs:
    - name: istio-alb-gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "*.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: istio-ingressgateway
          port: 8080
          kind: Service
