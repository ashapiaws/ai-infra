# HTTPRoute - routes traffic from the ALB Gateway to the Istio Ingress Gateway service
# The ALB forwards HTTPS traffic to the Istio Ingress Gateway (TLS re-encryption)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: istio-ingress-route
  namespace: istio-system
spec:
  parentRefs:
    - name: istio-alb-gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "*.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: istio-ingressgateway
          port: 443
          kind: Service
