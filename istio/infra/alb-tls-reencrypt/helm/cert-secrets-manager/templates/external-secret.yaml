{{- if .Values.externalSecrets.enabled }}
{{- range .Values.externalSecrets.targetNamespaces }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $.Values.externalSecrets.externalSecret.name }}
  namespace: {{ . }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.secretStore.name }}
    kind: {{ $.Values.externalSecrets.secretStore.kind }}
  target:
    name: {{ $.Values.externalSecrets.secretName }}
    creationPolicy: Owner
    template:
      type: {{ $.Values.externalSecrets.secretType }}
      data:
        tls.crt: |-
          {{`{{ .tls_crt }}`}}
        tls.key: |-
          {{`{{ .tls_key }}`}}
  dataFrom:
    - extract:
        key: {{ $.Values.externalSecrets.externalSecret.secretArn }}
{{- end }}
{{- end }}
