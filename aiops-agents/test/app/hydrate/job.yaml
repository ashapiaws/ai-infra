apiVersion: batch/v1
kind: Job
metadata:
  name: hydrate-db
  namespace: aiops-app
  labels:
    app: hydrate-db
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: hydrate-db
    spec:
      restartPolicy: OnFailure
      containers:
        - name: hydrate
          image: python:3.12-slim
          command:
            - /bin/bash
            - -c
            - |
              pip install psycopg2-binary && python /scripts/hydrate_db.py
          env:
            - name: POSTGRES_HOST
              value: postgres.aiops-app.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: hydrate-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hydrate-script
  namespace: aiops-app
data:
  hydrate_db.py: |
    # This will be replaced by the actual script content via:
    # kubectl create configmap hydrate-script --from-file=hydrate_db.py -n aiops-app
    pass
