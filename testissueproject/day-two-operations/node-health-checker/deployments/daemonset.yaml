apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-health-checker
  namespace: kube-system
  labels:
    app: node-health-checker
    component: monitoring
spec:
  selector:
    matchLabels:
      app: node-health-checker
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: node-health-checker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      hostPID: true
      hostIPC: true
      
      serviceAccountName: node-health-checker
      
      tolerations:
      # Run on all nodes including control plane
      - operator: Exists
        effect: NoSchedule
      - operator: Exists
        effect: NoExecute
      
      containers:
      - name: node-health-checker
        image: node-health-checker:latest
        imagePullPolicy: IfNotPresent
        
        args:
        - --metrics-addr=:9100
        - --health-addr=:8080
        - --collection-interval=60s
        - --dmesg-lines=100
        - --log-level=info
        
        ports:
        - name: metrics
          containerPort: 9100
          protocol: TCP
        - name: health
          containerPort: 8080
          protocol: TCP
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        
        securityContext:
          privileged: true
          runAsUser: 0
          readOnlyRootFilesystem: false
        
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
        - name: systemd
          mountPath: /run/systemd
          readOnly: true
        
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      - name: systemd
        hostPath:
          path: /run/systemd
          type: Directory
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-health-checker
  namespace: kube-system
  labels:
    app: node-health-checker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-health-checker
  labels:
    app: node-health-checker
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/status
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-health-checker
  labels:
    app: node-health-checker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-health-checker
subjects:
- kind: ServiceAccount
  name: node-health-checker
  namespace: kube-system
